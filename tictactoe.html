<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 8px rgba(233,69,96,0.4); }
      to   { box-shadow: 0 0 20px rgba(233,69,96,0.9); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #c73652; transform: scale(1.04); }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #888;
    }

    .score-item span { font-weight: bold; color: #eee; }
    .score-item .label-x { color: #e94560; }
    .score-item .label-o { color: #a8dadc; }

    select {
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      border: none;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="status">Player X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="controls">
  <select id="mode">
    <option value="2p">2 Players</option>
    <option value="easy">vs Computer (Easy)</option>
    <option value="hard">vs Computer (Hard)</option>
  </select>
  <button id="restart">Restart</button>
</div>

<div id="score">
  <div class="score-item"><span class="label-x">X</span>: <span id="sx">0</span></div>
  <div class="score-item"><span>Draws</span>: <span id="sd">0</span></div>
  <div class="score-item"><span class="label-o">O</span>: <span id="so">0</span></div>
</div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, gameOver, scores = {X:0,O:0,D:0};

  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const modeEl = document.getElementById('mode');

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent=''; c.className='cell'; });
    status.textContent = "Player X's turn";
  }

  function checkWin(b, p) {
    return WINS.find(combo => combo.every(i => b[i] === p)) || null;
  }

  function checkDraw(b) { return b.every(c => c !== ''); }

  function applyMove(idx, player) {
    board[idx] = player;
    cells[idx].textContent = player;
    cells[idx].classList.add(player.toLowerCase(), 'taken');

    const win = checkWin(board, player);
    if (win) {
      win.forEach(i => cells[i].classList.add('win'));
      status.textContent = `Player ${player} wins!`;
      scores[player]++;
      updateScore();
      gameOver = true;
      return;
    }
    if (checkDraw(board)) {
      status.textContent = "It's a draw!";
      scores.D++;
      updateScore();
      gameOver = true;
      return;
    }
    current = player === 'X' ? 'O' : 'X';
    const mode = modeEl.value;
    if (current === 'O' && mode !== '2p') {
      status.textContent = 'Computer is thinking...';
      setTimeout(() => computerMove(mode), 300);
    } else {
      status.textContent = `Player ${current}'s turn`;
    }
  }

  function computerMove(mode) {
    if (gameOver) return;
    const move = mode === 'hard' ? bestMove(board) : randomMove(board);
    applyMove(move, 'O');
  }

  function randomMove(b) {
    const empty = b.map((v,i) => v===''?i:-1).filter(i=>i>=0);
    return empty[Math.floor(Math.random()*empty.length)];
  }

  function bestMove(b) {
    let best = -Infinity, move = -1;
    b.forEach((v,i) => {
      if (v !== '') return;
      b[i] = 'O';
      const score = minimax(b, 0, false);
      b[i] = '';
      if (score > best) { best = score; move = i; }
    });
    return move;
  }

  function minimax(b, depth, isMax) {
    if (checkWin(b,'O')) return 10 - depth;
    if (checkWin(b,'X')) return depth - 10;
    if (b.every(c=>c!=='')) return 0;
    if (isMax) {
      let best = -Infinity;
      b.forEach((v,i) => { if(v!==''){return;} b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=''; });
      return best;
    } else {
      let best = Infinity;
      b.forEach((v,i) => { if(v!==''){return;} b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=''; });
      return best;
    }
  }

  function updateScore() {
    document.getElementById('sx').textContent = scores.X;
    document.getElementById('so').textContent = scores.O;
    document.getElementById('sd').textContent = scores.D;
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i] !== '') return;
      const mode = modeEl.value;
      if (current === 'O' && mode !== '2p') return;
      applyMove(i, current);
    });
  });

  document.getElementById('restart').addEventListener('click', init);

  init();
</script>
</body>
</html>
